name: Bug Report
description: Something isn't working right
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting! Please fill in what you can.

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Clear description of the bug
      placeholder: "When I run /ltm:recall, it returns..."
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
      placeholder: "It should have returned..."

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Run `/ltm:recall "some query"`
        2. See error...

  - type: dropdown
    id: install-method
    attributes:
      label: Install method
      options:
        - Marketplace (claude plugin install)
        - Git clone
        - Other
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Plugin version
      description: "Check with: jq .version .claude-plugin/plugin.json"
      placeholder: "1.3.8"

  - type: input
    id: os
    attributes:
      label: OS
      placeholder: "macOS 15.3 / Ubuntu 24.04 / Windows 11"

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: "Run `/ltm:hook-doctor` and paste output, or any error messages"
      render: shell
